apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
        - name: devops-container
          image: veerase/devops-app:15e01e1c5769fe187d58ab6dcbf5e212afb2d084
          ports:
            - containerPort: 3000
